<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My p5.js Portfolio</title>

  <style>
    body{
      margin:0;
      padding:30px;
      background:#f5f5f5;
      text-align:center;
      font-family:sans-serif;
    }

    h1{
      margin-bottom:20px;
    }

    #projects{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      max-width:800px;
      margin:auto;
    }

    .cell{
      aspect-ratio:16/9;
      overflow:hidden;
      border-radius:10px;
      background:white;
      box-shadow:0 3px 10px rgba(0,0,0,0.15);
    }

    iframe{
      width:600px;
      height:400px;
      border:none;
      transform:scale(0.5);
      transform-origin:top left;
    }
  </style>
</head>

<body>

<h1>🎨 My p5.js Portfolio</h1>

<div id="projects">

  <div class="cell">
   <iframe src="sample1/Honey_case_2026_06_08_13_48_30/index.html"></iframe>
  </div>

  <div class="cell">
    <iframe src="sample4/index.html"></iframe>
  </div>

  <div class="cell">
    <iframe src="sample2/Fluttering_vulcanodon_2026_06_08_13_48_27/index.html"></iframe>
  </div>

  <div class="cell">
    <iframe src="sample3/Plastic_badge_2026_06_08_13_48_24/index.html"></iframe>
  </div>

</div>

</body>
</html>
